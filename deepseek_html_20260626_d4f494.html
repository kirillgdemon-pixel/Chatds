<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sumlio — Мессенджер</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #0d0d16;
            --bg-input: #161622;
            --bg-message-other: #1a1a2e;
            --bg-message-mine: #2a2a4e;
            --text-primary: #ffffff;
            --text-secondary: #8888aa;
            --text-muted: #555577;
            --border-color: #222244;
            --border-light: #1a1a2e;
            --green: #00cc77;
            --red: #ff4466;
            --nav-active: #33D6FF;
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 820px;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
        @media (max-width:420px) { #app { max-height:100vh; border-radius:0; } }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px 20px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
            background: var(--bg-primary);
            z-index: 10;
        }
        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .header-title span { color: var(--nav-active); }
        .header-actions { display: flex; gap: 10px; }
        .header-btn {
            width: 40px; height: 40px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .header-btn:active { transform: scale(0.92); border-color: var(--nav-active); }
        .header-btn svg {
            width: 20px; height: 20px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
        }
        .chat-list-container::-webkit-scrollbar { width: 3px; }
        .chat-list-container::-webkit-scrollbar-track { background: transparent; }
        .chat-list-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: var(--radius);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .chat-item:active { transform: scale(0.98); border-color: var(--nav-active); }
        .chat-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--nav-active);
            flex-shrink: 0;
            border: 2px solid var(--border-color);
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .chat-last-msg {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .chat-time {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
            margin-left: 8px;
        }
        .chat-unread {
            background: var(--nav-active);
            color: #000;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            flex-shrink: 0;
        }
        .chat-status {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .chat-status.online { color: var(--green); }
        .chat-status.offline { color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .empty-state .empty-icon {
            width: 80px; height: 80px;
            opacity: 0.6;
        }
        .empty-state .empty-icon svg {
            width: 100%; height: 100%;
            stroke: var(--text-muted);
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .empty-state .empty-text {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .empty-state .empty-sub {
            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.7;
        }
        .empty-state .empty-action-btn {
            margin-top: 8px;
            padding: 12px 32px;
            background: var(--nav-active);
            border: none;
            border-radius: 30px;
            color: #000;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 0 20px rgba(51, 214, 255, 0.2);
        }
        .empty-state .empty-action-btn:active { transform: scale(0.95); }

        .chat-window {
            display: none;
            flex-direction: column;
            flex: 1;
            background: var(--bg-primary);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .chat-window.open { display: flex; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-primary);
            flex-shrink: 0;
            gap: 12px;
        }
        .chat-header .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            transition: color var(--transition);
        }
        .chat-header .back-btn:active { color: var(--text-primary); }
        .chat-header .chat-avatar-sm {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--nav-active);
            border: 2px solid var(--border-color);
            flex-shrink: 0;
        }
        .chat-header .chat-user-info { flex: 1; }
        .chat-header .chat-user-info .name { font-size: 16px; font-weight: 600; }
        .chat-header .chat-user-info .status {
            font-size: 12px;
            color: var(--text-muted);
        }
        .chat-header .chat-user-info .status.online { color: var(--green); }
        .chat-header .chat-user-info .status.offline { color: var(--red); }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .messages-container::-webkit-scrollbar { width: 3px; }
        .messages-container::-webkit-scrollbar-track { background: transparent; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: msgIn 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .message.mine {
            align-self: flex-end;
            background: var(--bg-message-mine);
            border: 1px solid var(--nav-active);
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: var(--bg-message-other);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }
        .message .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
        }
        .message .msg-sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--nav-active);
            margin-bottom: 2px;
        }

        .message-divider {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 8px 0;
            position: relative;
        }
        .message-divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: var(--border-light);
        }
        .message-divider span {
            background: var(--bg-primary);
            padding: 0 12px;
            position: relative;
            z-index: 1;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-primary);
            flex-shrink: 0;
            align-items: flex-end;
        }
        .chat-input-area textarea {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 15px;
            padding: 10px 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            min-height: 44px;
            max-height: 120px;
            transition: border-color var(--transition);
        }
        .chat-input-area textarea:focus { border-color: var(--nav-active); }
        .chat-input-area textarea::placeholder { color: var(--text-muted); }
        .chat-input-area .send-btn {
            width: 44px; height: 44px;
            border: none;
            border-radius: 50%;
            background: var(--nav-active);
            color: #000;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
            align-self: flex-end;
        }
        .chat-input-area .send-btn:active { transform: scale(0.9); }
        .chat-input-area .send-btn svg {
            width: 22px; height: 22px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; }
        .modal-overlay.closing { animation: fadeOut 0.25s ease forwards; }
        @keyframes fadeOut { from { opacity:1; } to { opacity:0; } }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px 20px 20px 20px;
            width: calc(100% - 32px);
            max-width: 360px;
            animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
        .modal.closing { animation: modalOut 0.25s cubic-bezier(0.4,0,0.2,1) forwards; }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes modalOut {
            from { opacity: 1; transform: scale(1) translateY(0); }
            to { opacity: 0; transform: scale(0.9) translateY(20px); }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
            transition: color var(--transition);
        }
        .modal-close:active { color: var(--text-primary); }
        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 15px;
            transition: border-color var(--transition);
            outline: none;
        }
        .form-input:focus { border-color: var(--nav-active); }
        .form-input::placeholder { color: var(--text-muted); }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            width: 100%;
            color: #fff;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--nav-active); color: #000; }
        .btn-primary:active { background: #22c4ee; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .btn-outline:active { background: var(--bg-input); }
        .btn-danger { background: var(--red); }
        .btn-danger:active { background: #ee2244; }
        .btn-group { display: flex; gap: 10px; margin-top: 8px; }
        .btn-group .btn { flex: 1; }

        .toast {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 200;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 16px;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
        }
        .settings-item:active {
            background: var(--bg-secondary);
            border-color: var(--nav-active);
        }
        .settings-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .settings-item-left svg {
            width: 20px; height: 20px;
            stroke: var(--text-secondary);
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .settings-item-label {
            font-size: 14px;
            color: var(--text-primary);
        }
        .settings-item-value {
            font-size: 13px;
            color: var(--text-muted);
        }
        .settings-item-arrow {
            color: var(--text-muted);
            font-size: 14px;
        }
        .settings-group-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 16px 4px 16px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
            padding: 6px 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .connection-status .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .connection-status .dot.online { background: var(--green); }
        .connection-status .dot.offline { background: var(--red); }
        .connection-status .dot.connecting { background: var(--yellow); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">

    <div id="toast" class="toast"></div>

    <div id="mainView" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
        <div class="header">
            <div class="header-title">Sum<span>lio</span></div>
            <div class="header-actions">
                <button class="header-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </button>
                <button class="header-btn" id="settingsBtn">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M12 8a4 4 0 0 1 0 8"/><path d="M18.4 8a4 4 0 0 1 0 8"/><path d="M5.6 8a4 4 0 0 1 0 8"/></svg>
                </button>
            </div>
        </div>
        <div class="connection-status" id="connectionStatus">
            <span class="dot offline" id="statusDot"></span>
            <span id="statusText">Подключение к серверу...</span>
            <span style="margin-left:auto;font-size:11px;" id="myIdStatus">ID: ---</span>
        </div>
        <div class="chat-list-container" id="chatListContainer"></div>
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <button class="back-btn" id="backFromChat">‹</button>
            <div class="chat-avatar-sm" id="chatWindowAvatar">U</div>
            <div class="chat-user-info">
                <div class="name" id="chatWindowName">Пользователь</div>
                <div class="status" id="chatWindowStatus">ожидание...</div>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="chat-input-area">
            <textarea id="messageInput" rows="1" placeholder="Сообщение..."></textarea>
            <button class="send-btn" id="sendMessageBtn">
                <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <button class="modal-close" id="modalCloseBtn">✕</button>
            <div class="modal-title" id="modalTitle">Новый чат</div>
            <div id="modalBody">
                <div class="form-group">
                    <label class="form-label">ID собеседника</label>
                    <input class="form-input" id="newChatUserId" placeholder="Введите ID пользователя">
                    <div style="font-size:12px;color:var(--text-muted);margin-top:6px;">
                        Ваш ID: <strong style="color:var(--nav-active);" id="myIdDisplayModal">---</strong>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Имя собеседника</label>
                    <input class="form-input" id="newChatUserName" placeholder="Как отображать в списке">
                </div>
                <div class="btn-group">
                    <button class="btn btn-outline" id="modalCancelBtn">Отмена</button>
                    <button class="btn btn-primary" id="modalStartBtn">Начать чат</button>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-window" id="settingsWindow">
        <div class="chat-header">
            <button class="back-btn" id="backFromSettings">‹</button>
            <div style="font-size:18px;font-weight:600;">Настройки</div>
        </div>
        <div style="flex:1;overflow-y:auto;">
            <div class="settings-group-title">Профиль</div>
            <div class="settings-list">
                <div class="settings-item" id="changeNameSetting">
                    <div class="settings-item-left">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <span class="settings-item-label">Моё имя</span>
                    </div>
                    <span class="settings-item-value" id="myNameDisplay">Пользователь</span>
                    <span class="settings-item-arrow">›</span>
                </div>
                <div class="settings-item" style="cursor:default;">
                    <div class="settings-item-left">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
                        <span class="settings-item-label">Мой ID</span>
                    </div>
                    <span class="settings-item-value" id="myIdValue">---</span>
                </div>
            </div>
            <div class="settings-group-title">Данные</div>
            <div class="settings-list">
                <div class="settings-item" id="exportDataBtn">
                    <div class="settings-item-left">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <span class="settings-item-label">Экспорт чатов</span>
                    </div>
                    <span class="settings-item-arrow">›</span>
                </div>
                <div class="settings-item" id="importDataBtn">
                    <div class="settings-item-left">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <span class="settings-item-label">Импорт чатов</span>
                    </div>
                    <span class="settings-item-arrow">›</span>
                </div>
                <div class="settings-item" id="resetDataBtn" style="border-color:var(--red);">
                    <div class="settings-item-left">
                        <svg viewBox="0 0 24 24" stroke="var(--red)"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        <span class="settings-item-label" style="color:var(--red);">Сбросить все данные</span>
                    </div>
                    <span class="settings-item-arrow" style="color:var(--red);">›</span>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
</script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js">
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {

    // ================================================================
    //  FIREBASE НАСТРОЙКИ (БЕСПЛАТНО)
    // ================================================================
    const firebaseConfig = {
        apiKey: "AIzaSyDp-9pVcHX4Wqo5hq9lCQFpPqY6tGpV8n0",
        authDomain: "sumlio-messenger.firebaseapp.com",
        databaseURL: "https://sumlio-messenger-default-rtdb.firebaseio.com",
        projectId: "sumlio-messenger",
        storageBucket: "sumlio-messenger.firebasestorage.app",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdef123456"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ================================================================
    //  STATE
    // ================================================================
    const STATE_KEY = 'sumlio_messenger_firebase';

    function getEmptyState() {
        return {
            myName: 'Пользователь',
            myId: generateId(),
            chats: [],
            nextId: 1000
        };
    }

    function generateId() {
        return 'user_' + Math.random().toString(36).substring(2, 10);
    }

    let state = loadState();

    function loadState() {
        try {
            const raw = localStorage.getItem(STATE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                const empty = getEmptyState();
                for (const key in empty) {
                    if (!(key in parsed)) parsed[key] = empty[key];
                }
                return parsed;
            }
        } catch(e) {}
        return getEmptyState();
    }

    function saveState() {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
        // Сохраняем онлайн-статус в Firebase
        if (state.myId) {
            db.ref('users/' + state.myId).set({
                name: state.myName,
                online: true,
                lastSeen: Date.now()
            });
        }
    }

    // ================================================================
    //  HELPERS
    // ================================================================
    function formatTime(ts) {
        const d = new Date(ts);
        return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }

    function formatDate(ts) {
        const d = new Date(ts);
        const today = new Date();
        if (d.toDateString() === today.toDateString()) return 'Сегодня';
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        if (d.toDateString() === yesterday.toDateString()) return 'Вчера';
        return d.toLocaleDateString('ru-RU', {day:'2-digit', month:'short'});
    }

    function getChatName(chat) {
        return chat.name || 'Без имени';
    }

    function getLastMessage(chat) {
        if (!chat.messages || chat.messages.length === 0) return 'Нет сообщений';
        return chat.messages[chat.messages.length - 1].text;
    }

    function getLastMessageTime(chat) {
        if (!chat.messages || chat.messages.length === 0) return '';
        return formatTime(chat.messages[chat.messages.length - 1].date);
    }

    function getUnreadCount(chat) {
        if (!chat.messages) return 0;
        return chat.messages.filter(m => !m.read && m.from !== state.myId).length;
    }

    function getInitials(name) {
        if (!name) return '?';
        return name.charAt(0).toUpperCase();
    }

    function isUserOnline(userId) {
        // Проверяем через Firebase
        return new Promise((resolve) => {
            db.ref('users/' + userId + '/online').once('value', (snapshot) => {
                resolve(snapshot.val() === true);
            });
        });
    }

    // ================================================================
    //  TOAST
    // ================================================================
    let toastTimeout = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        if (!el) return;
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ================================================================
    //  MODAL
    // ================================================================
    function openModal(title, html) {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        const titleEl = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        if (!overlay || !content || !titleEl || !body) return;
        overlay.classList.remove('closing');
        content.classList.remove('closing');
        titleEl.textContent = title;
        body.innerHTML = html;
        overlay.classList.add('open');
    }

    function closeModal() {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        if (!overlay || !content) return;
        content.classList.add('closing');
        overlay.classList.add('closing');
        setTimeout(() => {
            overlay.classList.remove('open');
            overlay.classList.remove('closing');
            content.classList.remove('closing');
        }, 300);
    }

    document.getElementById('modalOverlay')?.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    document.getElementById('modalCloseBtn')?.addEventListener('click', closeModal);

    // ================================================================
    //  NAVIGATION
    // ================================================================
    function showMainView() {
        document.getElementById('mainView').style.display = 'flex';
        document.getElementById('chatWindow').classList.remove('open');
        document.getElementById('settingsWindow').classList.remove('open');
        renderChats();
    }

    function showChat(chatId) {
        const chat = state.chats.find(c => c.id === chatId);
        if (!chat) {
            showToast('Чат не найден');
            return;
        }
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('settingsWindow').classList.remove('open');
        const window = document.getElementById('chatWindow');
        window.classList.add('open');
        renderChatWindow(chat);
    }

    function showSettings() {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('chatWindow').classList.remove('open');
        document.getElementById('settingsWindow').classList.add('open');
        renderSettings();
    }

    document.getElementById('backFromChat')?.addEventListener('click', showMainView);
    document.getElementById('backFromSettings')?.addEventListener('click', showMainView);
    document.getElementById('settingsBtn')?.addEventListener('click', showSettings);

    // ================================================================
    //  RENDER CHATS
    // ================================================================
    function renderChats() {
        const container = document.getElementById('chatListContainer');
        if (!container) return;

        if (state.chats.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <div class="empty-text">Нет чатов</div>
                    <div class="empty-sub">Найдите собеседника по его ID</div>
                    <button class="empty-action-btn" id="emptyNewChatBtn">+ Новый чат</button>
                </div>
            `;
            document.getElementById('emptyNewChatBtn')?.addEventListener('click', openNewChatModal);
            return;
        }

        container.innerHTML = state.chats.map(chat => {
            const lastMsg = getLastMessage(chat);
            const time = getLastMessageTime(chat);
            const unread = getUnreadCount(chat);
            const name = getChatName(chat);
            const initial = getInitials(name);
            // Проверяем онлайн статус
            const isOnline = chat._online !== undefined ? chat._online : true;
            const statusText = isOnline ? '🟢 онлайн' : '🔴 офлайн';
            const statusClass = isOnline ? 'online' : 'offline';
            
            return `
                <div class="chat-item" data-id="${chat.id}">
                    <div class="chat-avatar">${initial}</div>
                    <div class="chat-info">
                        <div class="chat-name">${name}</div>
                        <div class="chat-last-msg">${lastMsg}</div>
                        <div class="chat-status ${statusClass}">${statusText}</div>
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                        <div class="chat-time">${time}</div>
                        ${unread > 0 ? `<div class="chat-unread">${unread}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        container.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', function() {
                showChat(this.dataset.id);
            });
        });

        // Обновляем онлайн статусы из Firebase
        state.chats.forEach(chat => {
            db.ref('users/' + chat.id + '/online').on('value', (snapshot) => {
                chat._online = snapshot.val() === true;
                renderChats();
            });
        });
    }

    // ================================================================
    //  RENDER CHAT WINDOW
    // ================================================================
    let currentChatId = null;
    let messageListener = null;

    function renderChatWindow(chat) {
        currentChatId = chat.id;
        const name = getChatName(chat);
        const initial = getInitials(name);

        document.getElementById('chatWindowName').textContent = name;
        document.getElementById('chatWindowAvatar').textContent = initial;
        
        // Проверяем онлайн статус
        db.ref('users/' + chat.id + '/online').once('value', (snapshot) => {
            const isOnline = snapshot.val() === true;
            const statusEl = document.getElementById('chatWindowStatus');
            statusEl.textContent = isOnline ? '🟢 онлайн' : '🔴 офлайн';
            statusEl.className = 'status ' + (isOnline ? 'online' : 'offline');
        });

        const container = document.getElementById('messagesContainer');
        if (!chat.messages || chat.messages.length === 0) {
            container.innerHTML = `
                <div class="empty-state" style="padding:40px 0;">
                    <div class="empty-text" style="font-size:16px;">Нет сообщений</div>
                    <div class="empty-sub">Напишите первое сообщение</div>
                </div>
            `;
        } else {
            container.innerHTML = '';
            let lastDate = '';
            chat.messages.forEach((msg) => {
                const msgDate = formatDate(msg.date);
                if (msgDate !== lastDate) {
                    lastDate = msgDate;
                    const div = document.createElement('div');
                    div.className = 'message-divider';
                    div.innerHTML = `<span>${msgDate}</span>`;
                    container.appendChild(div);
                }
                const isMine = msg.from === state.myId;
                const div = document.createElement('div');
                div.className = `message ${isMine ? 'mine' : 'other'}`;
                if (!isMine) {
                    const sender = document.createElement('div');
                    sender.className = 'msg-sender';
                    sender.textContent = msg.senderName || name;
                    div.appendChild(sender);
                }
                const text = document.createElement('div');
                text.textContent = msg.text;
                div.appendChild(text);
                const time = document.createElement('div');
                time.className = 'msg-time';
                time.textContent = formatTime(msg.date);
                div.appendChild(time);
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        // Слушаем новые сообщения в Firebase
        if (messageListener) {
            db.ref('messages/' + chat.id).off();
        }
        messageListener = db.ref('messages/' + chat.id).on('child_added', (snapshot) => {
            const msg = snapshot.val();
            if (!msg) return;
            // Проверяем, не наше ли сообщение
            if (msg.from === state.myId) return;
            
            // Добавляем в локальный чат
            if (!chat.messages) chat.messages = [];
            chat.messages.push({
                from: msg.from,
                text: msg.text,
                date: msg.date,
                senderName: msg.senderName || name,
                read: false
            });
            saveState();
            renderChatWindow(chat);
            showToast('📩 Новое сообщение');
        });

        const input = document.getElementById('messageInput');
        if (input) {
            input.focus();
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
    }

    // ================================================================
    //  SEND MESSAGE ЧЕРЕЗ FIREBASE
    // ================================================================
    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input) return;
        const text = input.value.trim();
        if (!text || !currentChatId) return;

        const chat = state.chats.find(c => c.id === currentChatId);
        if (!chat) {
            showToast('Чат не найден');
            return;
        }

        if (!chat.messages) chat.messages = [];
        chat.messages.push({
            from: state.myId,
            text: text,
            date: Date.now(),
            read: true
        });
        saveState();

        // Отправляем в Firebase
        const msgRef = db.ref('messages/' + currentChatId).push();
        msgRef.set({
            from: state.myId,
            text: text,
            date: Date.now(),
            senderName: state.myName
        });

        input.value = '';
        input.style.height = 'auto';
        renderChatWindow(chat);
    }

    document.getElementById('sendMessageBtn')?.addEventListener('click', sendMessage);

    document.getElementById('messageInput')?.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // ================================================================
    //  NEW CHAT
    // ================================================================
    function openNewChatModal() {
        openModal('Новый чат', `
            <div class="form-group">
                <label class="form-label">ID собеседника</label>
                <input class="form-input" id="newChatUserId" placeholder="Введите ID пользователя">
                <div style="font-size:12px;color:var(--text-muted);margin-top:6px;">
                    Ваш ID: <strong style="color:var(--nav-active);">${state.myId}</strong>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Имя собеседника</label>
                <input class="form-input" id="newChatUserName" placeholder="Как отображать в списке">
            </div>
            <div class="btn-group">
                <button class="btn btn-outline" id="modalCancelBtn">Отмена</button>
                <button class="btn btn-primary" id="modalStartBtn">Начать чат</button>
            </div>
        `);

        document.getElementById('modalCancelBtn')?.addEventListener('click', closeModal);
        document.getElementById('modalStartBtn')?.addEventListener('click', function() {
            const userId = document.getElementById('newChatUserId')?.value.trim();
            const userName = document.getElementById('newChatUserName')?.value.trim();

            if (!userId) {
                showToast('Введите ID собеседника');
                return;
            }

            if (userId === state.myId) {
                showToast('Нельзя создать чат с самим собой');
                return;
            }

            // Проверяем, существует ли пользователь
            db.ref('users/' + userId).once('value', (snapshot) => {
                const user = snapshot.val();
                if (!user) {
                    showToast('❌ Пользователь не найден');
                    return;
                }

                const existing = state.chats.find(c => c.id === userId);
                if (existing) {
                    closeModal();
                    showChat(existing.id);
                    showToast('Чат уже существует');
                    return;
                }

                const newChat = {
                    id: userId,
                    name: userName || user.name || userId,
                    messages: []
                };
                state.chats.push(newChat);
                saveState();
                closeModal();
                renderChats();
                showChat(newChat.id);
                showToast('✅ Чат создан');
            });
        });
    }

    document.getElementById('newChatBtn')?.addEventListener('click', openNewChatModal);

    // ================================================================
    //  SETTINGS
    // ================================================================
    function renderSettings() {
        document.getElementById('myNameDisplay').textContent = state.myName || 'Пользователь';
        document.getElementById('myIdValue').textContent = state.myId || '---';
        document.getElementById('myIdDisplayModal').textContent = state.myId || '---';
        document.getElementById('myIdStatus').textContent = 'ID: ' + (state.myId || '---');
    }

    document.getElementById('changeNameSetting')?.addEventListener('click', function() {
        openModal('Моё имя', `
            <div class="form-group">
                <label class="form-label">Ваше имя</label>
                <input class="form-input" id="newNameInput" value="${state.myName || ''}" placeholder="Введите имя">
            </div>
            <div class="btn-group">
                <button class="btn btn-outline" id="nameCancelBtn">Отмена</button>
                <button class="btn btn-primary" id="nameSaveBtn">Сохранить</button>
            </div>
        `);
        document.getElementById('nameCancelBtn')?.addEventListener('click', closeModal);
        document.getElementById('nameSaveBtn')?.addEventListener('click', function() {
            const name = document.getElementById('newNameInput')?.value.trim();
            if (!name) {
                showToast('Введите имя');
                return;
            }
            state.myName = name;
            saveState();
            closeModal();
            renderSettings();
            renderChats();
            showToast('✅ Имя обновлено');
        });
    });

    document.getElementById('exportDataBtn')?.addEventListener('click', function() {
        const data = JSON.stringify(state, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'sumlio_backup.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('✅ Данные экспортированы');
    });

    document.getElementById('importDataBtn')?.addEventListener('click', function() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    const required = ['myName', 'myId', 'chats', 'nextId'];
                    for (const key of required) {
                        if (!(key in imported)) {
                            showToast('❌ Неверный формат файла');
                            return;
                        }
                    }
                    state = imported;
                    saveState();
                    renderChats();
                    renderSettings();
                    showToast('✅ Данные импортированы');
                } catch(err) {
                    showToast('❌ Ошибка чтения файла');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    });

    document.getElementById('resetDataBtn')?.addEventListener('click', function() {
        if (confirm('Удалить ВСЕ данные?')) {
            if (confirm('Это необратимо!')) {
                state = getEmptyState();
                saveState();
                renderChats();
                renderSettings();
                showToast('✅ Все данные удалены');
            }
        }
    });

    // ================================================================
    //  INIT
    // ================================================================
    function initFirebase() {
        // Сохраняем свой профиль
        db.ref('users/' + state.myId).set({
            name: state.myName,
            online: true,
            lastSeen: Date.now()
        });

        // При закрытии страницы — убираем онлайн статус
        window.addEventListener('beforeunload', function() {
            db.ref('users/' + state.myId + '/online').set(false);
        });

        // Обновляем статус раз в 30 секунд
        setInterval(() => {
            db.ref('users/' + state.myId).update({
                online: true,
                lastSeen: Date.now()
            });
        }, 30000);

        const dot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        dot.className = 'dot online';
        statusText.textContent = '✅ Подключено к серверу';

        showToast('✅ Подключено к серверу');
    }

    // Запускаем
    renderChats();
    renderSettings();
    showMainView();
    initFirebase();

    console.log('✅ Sumlio Messenger v3.0 (Firebase)');
    console.log('👤 Ваш ID:', state.myId);
    console.log('📊 Чатов:', state.chats.length);
});
</script>
</body>
</html>
