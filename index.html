<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sumlio — P2P Мессенджер</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #0d0d16;
            --bg-input: #161622;
            --bg-message-other: #1a1a2e;
            --bg-message-mine: #2a2a4e;
            --text-primary: #ffffff;
            --text-secondary: #8888aa;
            --text-muted: #555577;
            --border-color: #222244;
            --border-light: #1a1a2e;
            --green: #00cc77;
            --red: #ff4466;
            --nav-active: #33D6FF;
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 820px;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
        @media (max-width:420px) { #app { max-height:100vh; border-radius:0; } }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px 12px 20px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
            background: var(--bg-primary);
            z-index: 10;
        }
        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .header-title span { color: var(--nav-active); }
        .header-actions { display: flex; gap: 10px; }
        .header-btn {
            width: 40px; height: 40px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .header-btn:active { transform: scale(0.92); border-color: var(--nav-active); }
        .header-btn svg {
            width: 20px; height: 20px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
        }
        .chat-list-container::-webkit-scrollbar { width: 3px; }
        .chat-list-container::-webkit-scrollbar-track { background: transparent; }
        .chat-list-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: var(--radius);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all var(--transition);
        }
        .chat-item:active { transform: scale(0.98); border-color: var(--nav-active); }
        .chat-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--nav-active);
            flex-shrink: 0;
            border: 2px solid var(--border-color);
        }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .chat-last-msg {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .chat-time {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
            margin-left: 8px;
        }
        .chat-unread {
            background: var(--nav-active);
            color: #000;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            flex-shrink: 0;
        }
        .chat-status {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .chat-status.online { color: var(--green); }
        .chat-status.offline { color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .empty-state .empty-icon {
            width: 80px; height: 80px;
            opacity: 0.6;
        }
        .empty-state .empty-icon svg {
            width: 100%; height: 100%;
            stroke: var(--text-muted);
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .empty-state .empty-text {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .empty-state .empty-sub {
            font-size: 14px;
            color: var(--text-secondary);
            opacity: 0.7;
        }
        .empty-state .empty-action-btn {
            margin-top: 8px;
            padding: 12px 32px;
            background: var(--nav-active);
            border: none;
            border-radius: 30px;
            color: #000;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 0 20px rgba(51, 214, 255, 0.2);
        }
        .empty-state .empty-action-btn:active { transform: scale(0.95); }

        .chat-window {
            display: none;
            flex-direction: column;
            flex: 1;
            background: var(--bg-primary);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .chat-window.open { display: flex; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-primary);
            flex-shrink: 0;
            gap: 12px;
        }
        .chat-header .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            transition: color var(--transition);
        }
        .chat-header .back-btn:active { color: var(--text-primary); }
        .chat-header .chat-avatar-sm {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--nav-active);
            border: 2px solid var(--border-color);
            flex-shrink: 0;
        }
        .chat-header .chat-user-info { flex: 1; }
        .chat-header .chat-user-info .name { font-size: 16px; font-weight: 600; }
        .chat-header .chat-user-info .status {
            font-size: 12px;
            color: var(--text-muted);
        }
        .chat-header .chat-user-info .status.online { color: var(--green); }
        .chat-header .chat-user-info .status.offline { color: var(--red); }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .messages-container::-webkit-scrollbar { width: 3px; }
        .messages-container::-webkit-scrollbar-track { background: transparent; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: msgIn 0.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .message.mine {
            align-self: flex-end;
            background: var(--bg-message-mine);
            border: 1px solid var(--nav-active);
            border-bottom-right-radius: 4px;
        }
        .message.other {
            align-self: flex-start;
            background: var(--bg-message-other);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }
        .message .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
            text-align: right;
        }
        .message .msg-sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--nav-active);
            margin-bottom: 2px;
        }
        .message .msg-status {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            text-align: right;
        }
        .message .msg-status.delivered { color: var(--green); }
        .message .msg-status.sent { color: var(--text-muted); }

        .message-divider {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 8px 0;
            position: relative;
        }
        .message-divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: var(--border-light);
        }
        .message-divider span {
            background: var(--bg-primary);
            padding: 0 12px;
            position: relative;
            z-index: 1;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-primary);
            flex-shrink: 0;
            align-items: flex-end;
        }
        .chat-input-area textarea {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 15px;
            padding: 10px 14px;
            resize: none;
            outline: none;
            font-family: inherit;
            min-height: 44px;
            max-height: 120px;
            transition: border-color var(--transition);
        }
        .chat-input-area textarea:focus { border-color: var(--nav-active); }
        .chat-input-area textarea::placeholder { color: var(--text-muted); }
        .chat-input-area .send-btn {
            width: 44px; height: 44px;
            border: none;
            border-radius: 50%;
            background: var(--nav-active);
            color: #000;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
            align-self: flex-end;
        }
        .chat-input-area .send-btn:active { transform: scale(0.9); }
        .chat-input-area .send-btn svg {
            width: 22px; height: 22px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .chat-input-area .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; }
        .modal-overlay.closing { animation: fadeOut 0.25s ease forwards; }
        @keyframes fadeOut { from { opacity:1; } to { opacity:0; } }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px 20px 20px 20px;
            width: calc(100% - 32px);
            max-width: 360px;
            animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
        .modal.closing { animation: modalOut 0.25s cubic-bezier(0.4,0,0.2,1) forwards; }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes modalOut {
            from { opacity: 1; transform: scale(1) translateY(0); }
            to { opacity: 0; transform: scale(0.9) translateY(20px); }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
            transition: color var(--transition);
        }
        .modal-close:active { color: var(--text-primary); }
        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 15px;
            transition: border-color var(--transition);
            outline: none;
        }
        .form-input:focus { border-color: var(--nav-active); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            resize: vertical;
            outline: none;
            font-family: inherit;
            min-height: 80px;
        }
        .form-textarea:focus { border-color: var(--nav-active); }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            width: 100%;
            color: #fff;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--nav-active); color: #000; }
        .btn-primary:active { background: #22c4ee; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .btn-outline:active { background: var(--bg-input); }
        .btn-danger { background: var(--red); }
        .btn-danger:active { background: #ee2244; }
        .btn-group { display: flex; gap: 10px; margin-top: 8px; }
        .btn-group .btn { flex: 1; }

        .toast {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 200;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 16px;
        }
        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
        }
        .settings-item:active {
            background: var(--bg-secondary);
            border-color: var(--nav-active);
        }
        .settings-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .settings-item-left svg {
            width: 20px; height: 20px;
            stroke: var(--text-secondary);
            stroke-width: 1.8;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .settings-item-label {
            font-size: 14px;
            color: var(--text-primary);
        }
        .settings-item-value {
            font-size: 13px;
            color: var(--text-muted);
        }
        .settings-item-arrow {
            color: var(--text-muted);
            font-size: 14px;
        }
        .settings-group-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 16px 4px 16px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-light);
        }
        .connection-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .connection-status .dot.online { background: var(--green); }
        .connection-status .dot.offline { background: var(--red); }
        .connection-status .dot.connecting { background: var(--yellow); }
    </style>
</head>
<body>
<div id="app">

    <div id="toast" class="toast"></div>

    <!-- MAIN VIEW -->
    <div id="mainView" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
        <div class="header">
            <div class="header-title">Sum<span>lio</span></div>
            <div class="header-actions">
                <button class="header-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </button>
                <button class="header-btn" id="settingsBtn">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/><path d="M12 8a4 4 0 0 1 0 8"/><path d="M18.4 8a4 4 0 0 1 0 8"/><path d="M5.6 8a4 4 0 0 1 0 8"/></svg>
                </button>
            </div>
        </div>
        <div class="connection-status" id="connectionStatus">
            <span class="dot offline" id="statusDot"></span>
            <span id="statusText">Ожидание подключения</span>
        </div>
        <div class="chat-list-container" id="chatListContainer"></div>
    </div>

    <!-- CHAT WINDOW -->
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <button class="back-btn" id="backFromChat">‹</button>
            <div class="chat-avatar-sm" id="chatWindowAvatar">U</div>
            <div class="chat-user-info">
                <div class="name" id="chatWindowName">Пользователь</div>
                <div class="status" id="chatWindowStatus">подключение...</div>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="chat-input-area">
            <textarea id="messageInput" rows="1" placeholder="Сообщение..."></textarea>
            <button class="send-btn" id="sendMessageBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
            </button>
        </div>
    </div>

    <!-- NEW CHAT MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <button class="modal-close" id="modalCloseBtn">✕</button>
            <div class="modal-title" id="modalTitle">Новый чат</div>
            <div id="modalBody">
                <div class="form-group">
                    <label class="form-label">ID собеседника</label>
                    <input class="form-input" id="newChatUserId" placeholder="Введите ID пользователя">
                    <div style="font-size:12px;color:var(--text-muted);margin-top:6px;">
                        Ваш ID: <strong style="color:var(--nav-active);" id="myIdDisplayModal">---</strong>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Имя собеседника</label>
                    <input class="form-input" id="newChatUserName" placeholder="Как отображать в списке">
                </div>
                <div class="btn-group">
                    <button class="btn btn-outline" id="modalCancelBtn">Отмена</button>
                    <button class="btn btn-primary" id="modalStartBtn">Начать чат</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SETTINGS -->
    <div class="chat-window" id="settingsWindow">
        <div class="chat-header">
            <button class="back-btn" id="backFromSettings">‹</button>
            <div style="font-size:18px;font-weight:600;">Настройки</div>
        </div>
        <div style="flex:1;overflow-y:auto;">
            <div class="settings-group-title">Профиль</div>
            <div class="settings-list">
                <div class="settings-item" id="changeNameSetting">
                    <div class="settings-item-left">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <span class="settings-item-label">Моё имя</span>
                    </div>
                    <span class="settings-item-value" id="myNameDisplay">Пользователь</span>
                    <span class="settings-item-arrow">›</span>
                </div>
                <div class="settings-item" style="cursor:default;">
                    <div class="settings-item-left">
                        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
                        <span class="settings-item-label">Мой ID</span>
                    </div>
                    <span class="settings-item-value" id="myIdValue">---</span>
                </div>
            </div>
            <div class="settings-group-title">Данные</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

    // ================================================================
    //  WEBRTC — РЕАЛЬНАЯ ОТПРАВКА СООБЩЕНИЙ
    // ================================================================
    class P2PMessenger {
        constructor() {
            this.peer = null;
            this.connections = new Map(); // userId -> { conn, name, chatId }
            this.onMessage = null;
            this.onConnectionChange = null;
            this.myId = this.generateId();
            this.myName = 'Пользователь';
        }

        generateId() {
            return 'user_' + Math.random().toString(36).substring(2, 8);
        }

        init() {
            this.peer = new Peer(this.myId, {
                debug: 2,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            this.peer.on('open', (id) => {
                console.log('✅ Peer открыт, ID:', id);
                this.myId = id;
                this.updateStatus('online', 'Подключено к сети');
                this.checkPendingConnections();
            });

            this.peer.on('connection', (conn) => {
                console.log('📥 Входящее соединение от:', conn.peer);
                this.handleConnection(conn);
            });

            this.peer.on('error', (err) => {
                console.error('❌ Ошибка Peer:', err);
                this.updateStatus('offline', 'Ошибка подключения');
            });

            this.peer.on('disconnected', () => {
                console.log('🔌 Peer отключился');
                this.updateStatus('offline', 'Отключено');
            });
        }

        handleConnection(conn) {
            const userId = conn.peer;
            
            conn.on('open', () => {
                console.log('✅ Соединение установлено с:', userId);
                // Отправляем своё имя при подключении
                conn.send({
                    type: 'handshake',
                    name: this.myName
                });
                this.connections.set(userId, {
                    conn: conn,
                    name: userId,
                    chatId: null,
                    connected: true
                });
                this.updateConnectionStatus(userId, 'online');
                if (this.onConnectionChange) {
                    this.onConnectionChange(userId, 'online');
                }
            });

            conn.on('data', (data) => {
                console.log('📩 Получено от', userId, ':', data);
                
                if (data.type === 'handshake') {
                    const connData = this.connections.get(userId);
                    if (connData) {
                        connData.name = data.name || userId;
                        this.connections.set(userId, connData);
                        if (this.onConnectionChange) {
                            this.onConnectionChange(userId, 'online', connData.name);
                        }
                    }
                    return;
                }

                if (data.type === 'message') {
                    if (this.onMessage) {
                        this.onMessage({
                            from: userId,
                            text: data.text,
                            date: data.date || Date.now(),
                            senderName: this.connections.get(userId)?.name || userId
                        });
                    }
                }
            });

            conn.on('close', () => {
                console.log('🔌 Соединение закрыто с:', userId);
                this.connections.delete(userId);
                this.updateConnectionStatus(userId, 'offline');
                if (this.onConnectionChange) {
                    this.onConnectionChange(userId, 'offline');
                }
            });

            conn.on('error', (err) => {
                console.error('❌ Ошибка соединения:', err);
            });
        }

        connectTo(userId, chatId, onSuccess) {
            if (this.connections.has(userId)) {
                console.log('⚠️ Уже подключены к:', userId);
                if (onSuccess) onSuccess(this.connections.get(userId));
                return;
            }

            console.log('🔗 Подключаемся к:', userId);
            const conn = this.peer.connect(userId, {
                reliable: true
            });

            this.connections.set(userId, {
                conn: conn,
                name: userId,
                chatId: chatId,
                connected: false
            });

            conn.on('open', () => {
                console.log('✅ Подключено к:', userId);
                const data = this.connections.get(userId);
                if (data) {
                    data.connected = true;
                    this.connections.set(userId, data);
                    // Отправляем своё имя
                    conn.send({
                        type: 'handshake',
                        name: this.myName
                    });
                    this.updateConnectionStatus(userId, 'online');
                    if (this.onConnectionChange) {
                        this.onConnectionChange(userId, 'online');
                    }
                    if (onSuccess) onSuccess(data);
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'handshake') {
                    const connData = this.connections.get(userId);
                    if (connData) {
                        connData.name = data.name || userId;
                        this.connections.set(userId, connData);
                        if (this.onConnectionChange) {
                            this.onConnectionChange(userId, 'online', connData.name);
                        }
                    }
                    return;
                }
                if (data.type === 'message') {
                    if (this.onMessage) {
                        this.onMessage({
                            from: userId,
                            text: data.text,
                            date: data.date || Date.now(),
                            senderName: this.connections.get(userId)?.name || userId
                        });
                    }
                }
            });

            conn.on('close', () => {
                this.connections.delete(userId);
                this.updateConnectionStatus(userId, 'offline');
                if (this.onConnectionChange) {
                    this.onConnectionChange(userId, 'offline');
                }
            });

            conn.on('error', (err) => {
                console.error('❌ Ошибка при подключении к', userId, ':', err);
                this.connections.delete(userId);
                this.updateConnectionStatus(userId, 'offline');
                if (this.onConnectionChange) {
                    this.onConnectionChange(userId, 'offline');
                }
            });
        }

        sendMessage(userId, text) {
            const data = this.connections.get(userId);
            if (!data || !data.connected) {
                console.error('❌ Не подключены к:', userId);
                return false;
            }
            try {
                data.conn.send({
                    type: 'message',
                    text: text,
                    date: Date.now()
                });
                return true;
            } catch(e) {
                console.error('❌ Ошибка отправки:', e);
                return false;
            }
        }

        getConnection(userId) {
            return this.connections.get(userId);
        }

        isConnected(userId) {
            const data = this.connections.get(userId);
            return data && data.connected;
        }

        updateStatus(state, text) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            if (dot) {
                dot.className = 'dot ' + state;
            }
            if (statusText) {
                statusText.textContent = text || state;
            }
        }

        updateConnectionStatus(userId, state) {
            // Можно обновить UI для конкретного пользователя
        }

        checkPendingConnections() {
            // Проверяем, есть ли ожидающие соединения
        }

        getMyId() {
            return this.myId;
        }

        setMyName(name) {
            this.myName = name;
            // Отправляем обновление имени всем подключенным
            this.connections.forEach((data, userId) => {
                if (data.connected) {
                    try {
                        data.conn.send({
                            type: 'handshake',
                            name: name
                        });
                    } catch(e) {}
                }
            });
        }
    }

    // ================================================================
    //  STATE
    // ================================================================
    const STATE_KEY = 'sumlio_p2p_messenger';

    function getEmptyState() {
        return {
            myName: 'Пользователь',
            myId: null, // будет установлен из Peer
            chats: [],
            nextId: 1000
        };
    }

    function loadState() {
        try {
            const raw = localStorage.getItem(STATE_KEY);
            if (raw) {
                const parsed = JSON.parse(raw);
                const empty = getEmptyState();
                for (const key in empty) {
                    if (!(key in parsed)) parsed[key] = empty[key];
                }
                return parsed;
            }
        } catch(e) {}
        return getEmptyState();
    }

    let state = loadState();

    function saveState() {
        localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    function generateChatId() {
        return 'chat_' + (state.nextId++);
    }

    // ================================================================
    //  HELPERS
    // ================================================================
    function formatTime(ts) {
        const d = new Date(ts);
        return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }

    function formatDate(ts) {
        const d = new Date(ts);
        const today = new Date();
        if (d.toDateString() === today.toDateString()) return 'Сегодня';
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);
        if (d.toDateString() === yesterday.toDateString()) return 'Вчера';
        return d.toLocaleDateString('ru-RU', {day:'2-digit', month:'short'});
    }

    function getChatName(chat) {
        return chat.name || 'Без имени';
    }

    function getLastMessage(chat) {
        if (!chat.messages || chat.messages.length === 0) return 'Нет сообщений';
        return chat.messages[chat.messages.length - 1].text;
    }

    function getLastMessageTime(chat) {
        if (!chat.messages || chat.messages.length === 0) return '';
        return formatTime(chat.messages[chat.messages.length - 1].date);
    }

    function getUnreadCount(chat) {
        if (!chat.messages) return 0;
        return chat.messages.filter(m => !m.read && m.from !== messenger.getMyId()).length;
    }

    function getInitials(name) {
        if (!name) return '?';
        return name.charAt(0).toUpperCase();
    }

    // ================================================================
    //  TOAST
    // ================================================================
    let toastTimeout = null;
    function showToast(msg) {
        const el = document.getElementById('toast');
        if (!el) return;
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ================================================================
    //  MODAL
    // ================================================================
    function openModal(title, html) {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        const titleEl = document.getElementById('modalTitle');
        const body = document.getElementById('modalBody');
        if (!overlay || !content || !titleEl || !body) return;
        overlay.classList.remove('closing');
        content.classList.remove('closing');
        titleEl.textContent = title;
        body.innerHTML = html;
        overlay.classList.add('open');
    }

    function closeModal() {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        if (!overlay || !content) return;
        content.classList.add('closing');
        overlay.classList.add('closing');
        setTimeout(() => {
            overlay.classList.remove('open');
            overlay.classList.remove('closing');
            content.classList.remove('closing');
        }, 300);
    }

    document.getElementById('modalOverlay')?.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    document.getElementById('modalCloseBtn')?.addEventListener('click', closeModal);

    // ================================================================
    //  NAVIGATION
    // ================================================================
    function showMainView() {
        document.getElementById('mainView').style.display = 'flex';
        document.getElementById('chatWindow').classList.remove('open');
        document.getElementById('settingsWindow').classList.remove('open');
        renderChats();
    }

    function showChat(chatId) {
        const chat = state.chats.find(c => c.id === chatId);
        if (!chat) {
            showToast('Чат не найден');
            return;
        }
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('settingsWindow').classList.remove('open');
        const window = document.getElementById('chatWindow');
        window.classList.add('open');
        renderChatWindow(chat);
    }

    function showSettings() {
        document.getElementById('mainView').style.display = 'none';
        document.getElementById('chatWindow').classList.remove('open');
        document.getElementById('settingsWindow').classList.add('open');
        renderSettings();
    }

    document.getElementById('backFromChat')?.addEventListener('click', showMainView);
    document.getElementById('backFromSettings')?.addEventListener('click', showMainView);
    document.getElementById('settingsBtn')?.addEventListener('click', showSettings);

    // ================================================================
    //  RENDER CHATS
    // ================================================================
    function renderChats() {
        const container = document.getElementById('chatListContainer');
        if (!container) return;

        if (state.chats.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <div class="empty-text">Нет чатов</div>
                    <div class="empty-sub">Найдите собеседника по его ID</div>
                    <button class="empty-action-btn" id="emptyNewChatBtn">+ Новый чат</button>
                </div>
            `;
            document.getElementById('emptyNewChatBtn')?.addEventListener('click', openNewChatModal);
            return;
        }

        container.innerHTML = state.chats.map(chat => {
            const lastMsg = getLastMessage(chat);
            const time = getLastMessageTime(chat);
            const unread = getUnreadCount(chat);
            const name = getChatName(chat);
            const initial = getInitials(name);
            const isConnected = messenger.isConnected(chat.id);
            
            return `
                <div class="chat-item" data-id="${chat.id}">
                    <div class="chat-avatar">${initial}</div>
                    <div class="chat-info">
                        <div class="chat-name">${name}</div>
                        <div class="chat-last-msg">${lastMsg}</div>
                        <div class="chat-status ${isConnected ? 'online' : 'offline'}">
                            ${isConnected ? '🟢 онлайн' : '🔴 офлайн'}
                        </div>
                    </div>
                    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                        <div class="chat-time">${time}</div>
                        ${unread > 0 ? `<div class="chat-unread">${unread}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        container.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', function() {
                showChat(this.dataset.id);
            });
        });
    }

    // ================================================================
    //  RENDER CHAT WINDOW
    // ================================================================
    let currentChatId = null;

    function renderChatWindow(chat) {
        currentChatId = chat.id;
        const name = getChatName(chat);
        const initial = getInitials(name);
        const isConnected = messenger.isConnected(chat.id);

        document.getElementById('chatWindowName').textContent = name;
        document.getElementById('chatWindowAvatar').textContent = initial;
        const statusEl = document.getElementById('chatWindowStatus');
        statusEl.textContent = isConnected ? '🟢 онлайн' : '🔴 офлайн';
        statusEl.className = 'status ' + (isConnected ? 'online' : 'offline');

        const sendBtn = document.getElementById('sendMessageBtn');
        sendBtn.disabled = !isConnected;

        const container = document.getElementById('messagesContainer');
        if (!chat.messages || chat.messages.length === 0) {
            container.innerHTML = `
                <div class="empty-state" style="padding:40px 0;">
                    <div class="empty-text" style="font-size:16px;">Нет сообщений</div>
                    <div class="empty-sub">${isConnected ? 'Напишите первое сообщение' : 'Собеседник офлайн'}</div>
                </div>
            `;
        } else {
            container.innerHTML = '';
            let lastDate = '';
            chat.messages.forEach((msg) => {
                const msgDate = formatDate(msg.date);
                if (msgDate !== lastDate) {
                    lastDate = msgDate;
                    const div = document.createElement('div');
                    div.className = 'message-divider';
                    div.innerHTML = `<span>${msgDate}</span>`;
                    container.appendChild(div);
                }
                const isMine = msg.from === messenger.getMyId();
                const div = document.createElement('div');
                div.className = `message ${isMine ? 'mine' : 'other'}`;
                if (!isMine) {
                    const sender = document.createElement('div');
                    sender.className = 'msg-sender';
                    sender.textContent = msg.senderName || name;
                    div.appendChild(sender);
                }
                const text = document.createElement('div');
                text.textContent = msg.text;
                div.appendChild(text);
                const time = document.createElement('div');
                time.className = 'msg-time';
                time.textContent = formatTime(msg.date);
                div.appendChild(time);
                container.appendChild(div);

                if (!isMine && !msg.read) {
                    msg.read = true;
                }
            });
            chat.messages.forEach(m => { if (m.from !== messenger.getMyId()) m.read = true; });
            saveState();
            container.scrollTop = container.scrollHeight;
        }

        const input = document.getElementById('messageInput');
        if (input) {
            input.focus();
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }
    }

    // ================================================================
    //  SEND MESSAGE — ЧЕРЕЗ WEBRTC
    // ================================================================
    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (!input) return;
        const text = input.value.trim();
        if (!text || !currentChatId) return;

        const chat = state.chats.find(c => c.id === currentChatId);
        if (!chat) {
            showToast('Чат не найден');
            return;
        }

        const userId = chat.id;
        const isConnected = messenger.isConnected(userId);
        if (!isConnected) {
            showToast('Собеседник офлайн, сообщение не отправлено');
            return;
        }

        // Отправляем через WebRTC
        const sent = messenger.sendMessage(userId, text);
        if (!sent) {
            showToast('Ошибка отправки');
            return;
        }

        if (!chat.messages) chat.messages = [];

        // Добавляем в локальный чат
        chat.messages.push({
            from: messenger.getMyId(),
            text: text,
            date: Date.now(),
            read: true,
            delivered: true
        });

        saveState();
        input.value = '';
        input.style.height = 'auto';
        renderChatWindow(chat);
    }

    document.getElementById('sendMessageBtn')?.addEventListener('click', sendMessage);

    document.getElementById('messageInput')?.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // ================================================================
    //  NEW CHAT — ПО ID
    // ================================================================
    function openNewChatModal() {
        const myId = messenger.getMyId() || 'загрузка...';
        openModal('Новый чат', `
            <div class="form-group">
                <label class="form-label">ID собеседника</label>
                <input class="form-input" id="newChatUserId" placeholder="Например: user_a1b2c3">
                <div style="font-size:12px;color:var(--text-muted);margin-top:6px;">
                    Ваш ID: <strong style="color:var(--nav-active);">${myId}</strong>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Имя собеседника</label>
                <input class="form-input" id="newChatUserName" placeholder="Как отображать в списке">
            </div>
            <div class="btn-group">
                <button class="btn btn-outline" id="modalCancelBtn">Отмена</button>
                <button class="btn btn-primary" id="modalStartBtn">Начать чат</button>
            </div>
        `);

        document.getElementById('modalCancelBtn')?.addEventListener('click', closeModal);
        document.getElementById('modalStartBtn')?.addEventListener('click', function() {
            const userId = document.getElementById('newChatUserId')?.value.trim();
            const userName = document.getElementById('newChatUserName')?.value.trim();

            if (!userId) {
                showToast('Введите ID собеседника');
                return;
            }

            if (userId === messenger.getMyId()) {
                showToast('Нельзя создать чат с самим собой');
                return;
            }

            // Проверяем, есть ли уже чат
            const existing = state.chats.find(c => c.id === userId);
            if (existing) {
                closeModal();
                showChat(existing.id);
                showToast('Чат уже существует');
                return;
            }

            // Создаём новый чат
            const newChat = {
                id: userId,
                name: userName || userId,
                messages: []
            };
            state.chats.push(newChat);
            saveState();

            // Подключаемся к пользователю
            messenger.connectTo(userId, newChat.id, (connData) => {
                console.log('✅ Подключено к:', userId);
                showToast('Подключено к собеседнику');
                renderChatWindow(newChat);
            });

            closeModal();
            renderChats();
            showChat(newChat.id);
            showToast('Чат создан, подключаемся...');
        });

        document.getElementById('newChatUserId')?.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('modalStartBtn')?.click();
            }
        });
    }

    document.getElementById('newChatBtn')?.addEventListener('click', openNewChatModal);

    // ================================================================
    //  SETTINGS
    // ================================================================
    function renderSettings() {
        document.getElementById('myNameDisplay').textContent = state.myName || 'Пользователь';
        document.getElementById('myIdValue').textContent = messenger.getMyId() || '---';
        document.getElementById('myIdDisplayModal').textContent = messenger.getMyId() || '---';
    }

    document.getElementById('changeNameSetting')?.addEventListener('click', function() {
        openModal('Моё имя', `
            <div class="form-group">
                <label class="form-label">Ваше имя</label>
                <input class="form-input" id="newNameInput" value="${state.myName || ''}" placeholder="Введите имя">
                <div style="font-size:12px;color:var(--text-muted);margin-top:6px;">
                    Это имя увидят собеседники
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-outline" id="nameCancelBtn">Отмена</button>
                <button class="btn btn-primary" id="nameSaveBtn">Сохранить</button>
            </div>
        `);
        document.getElementById('nameCancelBtn')?.addEventListener('click', closeModal);
        document.getElementById('nameSaveBtn')?.addEventListener('click', function() {
            const name = document.getElementById('newNameInput')?.value.trim();
            if (!name) {
                showToast('Введите имя');
                return;
            }
            state.myName = name;
            messenger.setMyName(name);
            saveState();
            closeModal();
            renderSettings();
            renderChats();
            showToast('Имя обновлено');
        });
    });

    document.getElementById('shareIdBtn')?.addEventListener('click', function() {
        const id = messenger.getMyId();
        if (!id) {
            showToast('ID ещё не сгенерирован');
            return;
        }
        if (navigator.clipboard) {
            navigator.clipboard.writeText(id).then(() => {
                showToast('ID скопирован: ' + id);
            }).catch(() => {
                showToast('Ваш ID: ' + id);
            });
        } else {
            showToast('Ваш ID: ' + id);
        }
    });

    document.getElementById('reconnectBtn')?.addEventListener('click', function() {
        showToast('Переподключение...');
        // Переподключаемся ко всем чатам
        state.chats.forEach(chat => {
            if (!messenger.isConnected(chat.id)) {
                messenger.connectTo(chat.id, chat.id);
            }
        });
        setTimeout(() => {
            renderChats();
            showToast('Переподключение завершено');
        }, 1000);
    });

    document.getElementById('exportDataBtn')?.addEventListener('click', function() {
        const data = JSON.stringify(state, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'sumlio_p2p_backup.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Данные экспортированы');
    });

    document.getElementById('importDataBtn')?.addEventListener('click', function() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    const required = ['myName', 'chats', 'nextId'];
                    for (const key of required) {
                        if (!(key in imported)) {
                            showToast('Неверный формат файла');
                            return;
                        }
                    }
                    state = imported;
                    saveState();
                    renderChats();
                    renderSettings();
                    showToast('Данные импортированы');
                } catch(err) {
                    showToast('Ошибка чтения файла');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    });

    document.getElementById('resetDataBtn')?.addEventListener('click', function() {
        if (confirm('Удалить ВСЕ данные?')) {
            if (confirm('Это необратимо!')) {
                state = getEmptyState();
                saveState();
                renderChats();
                renderSettings();
                showToast('Все данные удалены');
            }
        }
    });

    // ================================================================
    //  INIT P2P MESSENGER
    // ================================================================
    const messenger = new P2PMessenger();
    
    // Восстанавливаем ID из состояния, если есть
    if (state.myId) {
        messenger.myId = state.myId;
    }
    messenger.myName = state.myName || 'Пользователь';

    // Обработчик входящих сообщений
    messenger.onMessage = (msg) => {
        console.log('📨 Сообщение от', msg.from, ':', msg.text);
        
        // Находим или создаём чат
        let chat = state.chats.find(c => c.id === msg.from);
        if (!chat) {
            chat = {
                id: msg.from,
                name: msg.senderName || msg.from,
                messages: []
            };
            state.chats.push(chat);
            saveState();
            renderChats();
        }

        if (!chat.messages) chat.messages = [];
        chat.messages.push({
            from: msg.from,
            text: msg.text,
            date: msg.date || Date.now(),
            senderName: msg.senderName || msg.from,
            read: false
        });
        saveState();

        // Если чат открыт — обновляем его
        if (currentChatId === chat.id) {
            renderChatWindow(chat);
        } else {
            // Обновляем список чатов
            renderChats();
            showToast('📩 Новое сообщение от ' + getChatName(chat));
        }
    };

    // Обработчик изменения статуса подключения
    messenger.onConnectionChange = (userId, status, name) => {
        console.log('🔄 Статус', userId, ':', status, name);
        const chat = state.chats.find(c => c.id === userId);
        if (chat && name) {
            chat.name = name;
            saveState();
        }
        renderChats();
        if (currentChatId === userId) {
            const statusEl = document.getElementById('chatWindowStatus');
            statusEl.textContent = status === 'online' ? '🟢 онлайн' : '🔴 офлайн';
            statusEl.className = 'status ' + (status === 'online' ? 'online' : 'offline');
            document.getElementById('sendMessageBtn').disabled = status !== 'online';
        }
    };

    // Инициализируем Peer
    messenger.init();

    // После инициализации обновляем ID в состоянии
    setTimeout(() => {
        const id = messenger.getMyId();
        if (id) {
            state.myId = id;
            saveState();
            renderSettings();
            renderChats();
        }
    }, 1000);

    // ================================================================
    //  INIT UI
    // ================================================================
    renderChats();
    renderSettings();
    showMainView();

    console.log('✅ Sumlio P2P Messenger v1.0');
    console.log('📡 Использует WebRTC для прямой отправки');
    console.log('💡 Поделитесь своим ID с собеседником');
});
</script>

<!-- Подключаем PeerJS -->
<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js">
</script>
</body>
</html>
